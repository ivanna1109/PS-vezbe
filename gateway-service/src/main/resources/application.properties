# Ruta za Order Service
#spring.cloud.gateway.server.webflux.routes[0].uri=${ORDER_SERVICE_URL:http://localhost:8081}

# Ruta za Restaurant Service
#spring.cloud.gateway.server.webflux.routes[1].uri=${RESTAURANT_SERVICE_URL:http://localhost:8082}
# Ostalo ostaje isto
springdoc.swagger-ui.urls[0].name=Order Service
#springdoc.swagger-ui.urls[0].url=/api/*/orders/v3/api-docs

springdoc.swagger-ui.urls[1].name=Restaurant Service
#springdoc.swagger-ui.urls[1].url=/api/*/restaurants/v3/api-docs
springdoc.swagger-ui.urls[0].url=/api/v5/orders/v3/api-docs
springdoc.swagger-ui.urls[1].url=/api/v5/restaurants/v3/api-docs

spring.cloud.gateway.server.webflux.globalcors.add-to-idp-col-mappings=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

#v6

# Omogucava tracing
management.tracing.enabled=false
management.tracing.sampling.probability=0.0

management.observations.http.server.requests.enabled=true

#v7 Docker

# Order Service Ruta
spring.cloud.gateway.server.webflux.routes[0].id=order-service
spring.cloud.gateway.server.webflux.routes[0].uri=${ORDER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/*/orders/**


# Restaurant Service Ruta
spring.cloud.gateway.server.webflux.routes[1].id=restaurant-service
spring.cloud.gateway.server.webflux.routes[1].uri=${RESTAURANT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/*/restaurants/**

springdoc.swagger-ui.supported-submit-methods=["get", "post", "put", "delete", "patch"]
springdoc.swagger-ui.filter=true

# Govori Swaggeru da zahtevi idu na root (Gateway port)
springdoc.api-docs.groups.enabled=true

