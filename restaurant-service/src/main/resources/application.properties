# Osnovna pode?avanja
spring.application.name=restaurant-service
# server.port=8082

#Nakon uvodjenja dockera
server.port=${SERVER_PORT:8082}

# H2 Baza u memoriji
spring.datasource.url=jdbc:h2:mem:restaurantdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate pode?avanja
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# automatski pravi tabele u bazi na osnovu Java klasa (@Entity)
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#Da se baza popuni podacima
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Pristup bazi preko browsera na http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.h2.console.settings.web-allow-others=true

# Swagger putanja
springdoc.swagger-ui.path=/swagger-ui.html

#v5
springdoc.api-docs.path=/api/*/restaurants/v3/api-docs

# Dozvoljava Swagger-u sa porta 8080 da povuce dokumentaciju
springdoc.api-docs.enabled=true
#springdoc.server.url=http://localhost:8080
#management.endpoints.web.cors.allowed-origins=http://localhost:8080
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE

#v7

management.endpoints.web.cors.allowed-origins=${GATEWAY_URL:http://localhost:8080}
springdoc.server.url=http://localhost:8080

springdoc.api-docs.groups.enabled=true
server.forward-headers-strategy=framework